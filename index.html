<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSM Navigator — Game UI Navigation Mapper</title>
<meta name="description" content="Interactive Finite State Machine builder and analyzer for game UI navigation mapping.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{--bg:#F5F0E8;--bg-panel:#EDE8DD;--text:#2C2825;--text-muted:#6B6560;--accent:#D97B2A;--error:#C0533A;--warn:#B8963E;--valid:#5A7A5C;--teal:#3A8A8C;--border:#D1C9BC;--shadow:rgba(44,40,37,.15);--radius:8px;--font-display:'Playfair Display',Georgia,serif;--font-mono:'IBM Plex Mono','Courier New',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:var(--font-mono);background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
#app{display:flex;flex-direction:column;height:100vh}
#app-header{display:flex;align-items:baseline;gap:16px;padding:12px 24px;border-bottom:2px solid var(--border);background:var(--bg-panel)}
#app-header h1{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--accent)}
.subtitle{font-size:.85rem;color:var(--text-muted)}
#panels{display:flex;flex:1;overflow:hidden}
.panel{background:var(--bg-panel);border-right:1px solid var(--border);overflow-y:auto;padding:16px;animation:panelIn .4s ease both}
.panel:last-child{border-right:none}
#left-panel{width:280px;min-width:240px}
#center-panel{flex:1;display:flex;flex-direction:column;padding:0;position:relative;background:var(--bg)}
#right-panel{width:260px;min-width:220px}
.panel h2{font-family:var(--font-display);font-size:1.15rem;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--text)}
#fsm-canvas{flex:1;width:100%;cursor:grab}
#fsm-canvas:active{cursor:grabbing}
.ctrl-group{margin-bottom:14px}
.ctrl-group label{display:block;font-size:.75rem;font-weight:500;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.ctrl-row{display:flex;gap:6px}
input[type="text"],select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:#FDFBF7;font-family:var(--font-mono);font-size:.82rem;color:var(--text);outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px;font-size:.78rem}
select{cursor:pointer}
button{padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(180deg,#FDFBF7 0%,var(--bg-panel) 100%);font-family:var(--font-mono);font-size:.8rem;font-weight:500;color:var(--text);cursor:pointer;box-shadow:0 2px 0 var(--border);transition:all .15s;position:relative;top:0}
button:hover{border-color:var(--accent);color:var(--accent)}
button:active{top:2px;box-shadow:none}
button.primary{background:linear-gradient(180deg,var(--accent) 0%,#C06A1E 100%);color:#fff;border-color:#B06818;box-shadow:0 2px 0 #8C5414}
button.primary:hover{background:linear-gradient(180deg,#E88A34 0%,var(--accent) 100%)}
button.danger{background:linear-gradient(180deg,var(--error) 0%,#A8432E 100%);color:#fff;border-color:#923A28;box-shadow:0 2px 0 #7A3020}
button.danger:hover{background:linear-gradient(180deg,#D06040 0%,var(--error) 100%)}
button.full{width:100%;margin-top:6px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius);font-family:var(--font-display);font-size:1.05rem;font-weight:700;animation:badgeIn .4s ease}
.badge.valid{background:#E8F0E8;color:var(--valid);border:1px solid var(--valid)}
.badge.invalid{background:#F5E8E4;color:var(--error);border:1px solid var(--error)}
.chip-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:500}
.chip.dead{background:#F5E8E4;color:var(--error)}
.chip.unreachable{background:#F5F0DC;color:var(--warn)}
.chip.ok{background:#E8F0E8;color:var(--valid)}
.result-section{margin-bottom:14px}
.result-section h3{font-size:.85rem;margin-bottom:4px;color:var(--text)}
.result-section .count{font-size:.75rem;color:var(--text-muted)}
.sim-trace{max-height:200px;overflow-y:auto;font-size:.78rem;padding:8px;background:#FDFBF7;border:1px solid var(--border);border-radius:var(--radius);margin-top:8px}
.sim-trace .step{padding:3px 0;border-bottom:1px solid var(--border)}
.sim-trace .step:last-child{border:none}
.sim-actions{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.sim-actions button{font-size:.78rem;padding:5px 10px}
.stuck-warn{padding:10px;background:#F5E8E4;border:1px solid var(--error);border-radius:var(--radius);color:var(--error);font-weight:500;margin-top:8px;font-size:.82rem}
.node-label{font-family:var(--font-mono);font-size:11px;fill:var(--text);text-anchor:middle;pointer-events:none}
.edge-label{font-family:var(--font-mono);font-size:10px;fill:var(--text-muted)}
.tooltip{position:absolute;background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:.78rem;box-shadow:0 4px 12px var(--shadow);pointer-events:none;z-index:100;max-width:220px;opacity:0;transition:opacity .2s}
.tooltip.show{opacity:1}
.tooltip h4{font-size:.82rem;margin-bottom:4px;color:var(--accent)}
.tooltip li{list-style:none;color:var(--text-muted);font-size:.75rem}
#modal-overlay{position:fixed;inset:0;background:rgba(44,40,37,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
#modal-overlay.hidden{display:none}
#modal-box{background:var(--bg);border-radius:12px;padding:24px;width:90%;max-width:560px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.25)}
#modal-box pre{flex:1;overflow:auto;background:#FDFBF7;border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:.78rem;margin:12px 0;white-space:pre-wrap;word-break:break-all}
#modal-close{position:absolute;right:8px;top:4px;border:none;background:none;font-size:1.4rem;cursor:pointer;color:var(--text-muted);box-shadow:none}
#modal-copy{align-self:flex-end}
#graph-toolbar{padding:8px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border);background:var(--bg-panel)}
@keyframes panelIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes badgeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes nodeIn{from{r:0;opacity:0}to{opacity:1}}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.6}}
@media(max-width:900px){#panels{flex-direction:column;overflow-y:auto}#left-panel,#right-panel{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border)}#center-panel{min-height:400px}}
</style>
</head>
<body>
<div id="app">
  <header id="app-header"><h1>FSM Navigator</h1><span class="subtitle">Game UI Navigation Mapper</span></header>
  <main id="panels">
    <aside id="left-panel" class="panel"><h2>FSM Builder</h2><div id="builder-controls"></div></aside>
    <section id="center-panel" class="panel"><div id="graph-toolbar"></div><svg id="fsm-canvas"></svg></section>
    <aside id="right-panel" class="panel"><h2>Analysis</h2><div id="analysis-output"></div></aside>
  </main>
</div>
<div id="modal-overlay" class="hidden"><div id="modal-box"><button id="modal-close">&times;</button><pre id="modal-content"></pre><button id="modal-copy">Copy to Clipboard</button></div></div>
<script>
(function(){
'use strict';

/* ===== DEFAULT FSM DATA ===== */
const DEFAULT_FSM = {
  states:["MainMenu","Settings","LevelSelect","Gameplay","Pause","GameOver"],
  startState:"MainMenu",
  transitions:[
    {from:"MainMenu",to:"Settings",action:"openSettings"},
    {from:"MainMenu",to:"LevelSelect",action:"play"},
    {from:"LevelSelect",to:"Gameplay",action:"startLevel"},
    {from:"Gameplay",to:"Pause",action:"pauseGame"},
    {from:"Pause",to:"Gameplay",action:"resume"},
    {from:"Gameplay",to:"GameOver",action:"die"},
    {from:"Settings",to:"MainMenu",action:"back"},
    {from:"LevelSelect",to:"MainMenu",action:"back"},
    {from:"Pause",to:"MainMenu",action:"quitToMenu"}
  ]
};

let fsm, nodePositions, simState, analysisResult;
const NODE_R = 36;

function init(){
  fsm = JSON.parse(JSON.stringify(DEFAULT_FSM));
  nodePositions = {};
  simState = {active:false, current:null, trace:[]};
  analysisResult = null;
  layoutNodes();
  buildControls();
  renderGraph();
  renderAnalysis();
}

function layoutNodes(){
  const cx=400, cy=300, r=180;
  fsm.states.forEach((s,i)=>{
    if(!nodePositions[s]){
      const a = (2*Math.PI*i/fsm.states.length) - Math.PI/2;
      nodePositions[s] = {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)};
    }
  });
}

/* ===== BUILDER CONTROLS ===== */
function buildControls(){
  const lp = document.getElementById('builder-controls');
  lp.innerHTML = `
    <div class="ctrl-group"><label>Add State</label>
      <div class="ctrl-row"><input type="text" id="inp-state" placeholder="StateName"><button id="btn-add-state">Add</button></div></div>
    <div class="ctrl-group"><label>Remove State</label>
      <div class="ctrl-row"><select id="sel-rm-state"></select><button id="btn-rm-state" class="danger">Remove</button></div></div>
    <div class="ctrl-group"><label>Add Transition</label>
      <select id="sel-from" style="margin-bottom:4px"></select>
      <select id="sel-to" style="margin-bottom:4px"></select>
      <div class="ctrl-row"><input type="text" id="inp-action" placeholder="actionName"><button id="btn-add-trans">Add</button></div></div>
    <div class="ctrl-group"><label>Remove Transition</label>
      <div class="ctrl-row"><select id="sel-rm-trans" style="font-size:.72rem"></select><button id="btn-rm-trans" class="danger">Rm</button></div></div>
    <div class="ctrl-group"><label>Start State</label>
      <div class="ctrl-row"><select id="sel-start"></select><button id="btn-set-start">Set</button></div></div>
    <button class="primary full" id="btn-analyze">⚙ Analyze FSM</button>
    <button class="full" id="btn-simulate">▶ Simulate</button>
    <button class="full" id="btn-export">↗ Export JSON</button>
    <div class="ctrl-group" style="margin-top:10px"><label>Import JSON</label>
      <textarea id="ta-import" placeholder='Paste JSON here...'></textarea>
      <button class="full" id="btn-import">Load JSON</button></div>
    <button class="danger full" id="btn-reset" style="margin-top:8px">⟳ Reset</button>
  `;
  populateSelects();
  document.getElementById('btn-add-state').onclick = addState;
  document.getElementById('btn-rm-state').onclick = removeState;
  document.getElementById('btn-add-trans').onclick = addTransition;
  document.getElementById('btn-rm-trans').onclick = removeTransition;
  document.getElementById('btn-set-start').onclick = setStart;
  document.getElementById('btn-analyze').onclick = ()=>{ runAnalysis(); renderGraph(); renderAnalysis(); };
  document.getElementById('btn-simulate').onclick = toggleSimulation;
  document.getElementById('btn-export').onclick = exportJSON;
  document.getElementById('btn-import').onclick = importJSON;
  document.getElementById('btn-reset').onclick = ()=>{ init(); };
}

function populateSelects(){
  const opts = fsm.states.map(s=>`<option value="${s}">${s}</option>`).join('');
  ['sel-rm-state','sel-from','sel-to','sel-start'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.innerHTML = opts;
  });
  const sel = document.getElementById('sel-start');
  if(sel) sel.value = fsm.startState;
  const tOpts = fsm.transitions.map((t,i)=>`<option value="${i}">${t.from}→${t.to} [${t.action}]</option>`).join('');
  const rt = document.getElementById('sel-rm-trans');
  if(rt) rt.innerHTML = tOpts;
}

function addState(){
  const inp = document.getElementById('inp-state');
  const name = inp.value.trim();
  if(!name||fsm.states.includes(name)) return;
  fsm.states.push(name);
  const cx=400+Math.random()*200-100, cy=300+Math.random()*200-100;
  nodePositions[name]={x:cx,y:cy};
  inp.value='';
  populateSelects(); renderGraph();
}
function removeState(){
  const s = document.getElementById('sel-rm-state').value;
  if(!s) return;
  fsm.states = fsm.states.filter(x=>x!==s);
  fsm.transitions = fsm.transitions.filter(t=>t.from!==s&&t.to!==s);
  delete nodePositions[s];
  if(fsm.startState===s) fsm.startState=fsm.states[0]||'';
  populateSelects(); renderGraph(); renderAnalysis();
}
function addTransition(){
  const from=document.getElementById('sel-from').value;
  const to=document.getElementById('sel-to').value;
  const action=document.getElementById('inp-action').value.trim();
  if(!from||!to||!action) return;
  if(fsm.transitions.some(t=>t.from===from&&t.to===to&&t.action===action)) return;
  fsm.transitions.push({from,to,action});
  document.getElementById('inp-action').value='';
  populateSelects(); renderGraph();
}
function removeTransition(){
  const idx = parseInt(document.getElementById('sel-rm-trans').value);
  if(isNaN(idx)) return;
  fsm.transitions.splice(idx,1);
  populateSelects(); renderGraph();
}
function setStart(){
  fsm.startState = document.getElementById('sel-start').value;
  renderGraph();
}
function exportJSON(){
  document.getElementById('modal-content').textContent = JSON.stringify(fsm,null,2);
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function importJSON(){
  try{
    const data = JSON.parse(document.getElementById('ta-import').value);
    if(!data.states||!data.startState||!data.transitions) throw new Error('Invalid');
    fsm = data;
    nodePositions = {};
    layoutNodes();
    populateSelects(); renderGraph(); renderAnalysis();
  }catch(e){ alert('Invalid JSON: '+e.message); }
}

/* ===== MODAL ===== */
document.getElementById('modal-close').onclick = ()=> document.getElementById('modal-overlay').classList.add('hidden');
document.getElementById('modal-copy').onclick = ()=>{
  navigator.clipboard.writeText(document.getElementById('modal-content').textContent);
  document.getElementById('modal-copy').textContent='Copied!';
  setTimeout(()=>document.getElementById('modal-copy').textContent='Copy to Clipboard',1500);
};
document.getElementById('modal-overlay').onclick = e=>{
  if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.add('hidden');
};

/* ===== ANALYSIS ===== */
function runAnalysis(){
  const outgoing={}, incoming={};
  fsm.states.forEach(s=>{outgoing[s]=[];incoming[s]=[];});
  fsm.transitions.forEach(t=>{
    if(outgoing[t.from]) outgoing[t.from].push(t);
    if(incoming[t.to]) incoming[t.to].push(t);
  });
  const deadEnds = fsm.states.filter(s=>outgoing[s].length===0);
  // BFS for reachable
  const visited = new Set();
  if(fsm.startState){
    const q=[fsm.startState];
    visited.add(fsm.startState);
    while(q.length){
      const cur=q.shift();
      (outgoing[cur]||[]).forEach(t=>{
        if(!visited.has(t.to)){visited.add(t.to);q.push(t.to);}
      });
    }
  }
  const unreachable = fsm.states.filter(s=>!visited.has(s));
  const valid = !!fsm.startState && deadEnds.length===0 && unreachable.length===0;
  analysisResult = {deadEnds, unreachable, valid, outgoing};
}

function renderAnalysis(){
  const out = document.getElementById('analysis-output');
  if(!analysisResult){
    out.innerHTML = '<p style="color:var(--text-muted);font-size:.82rem">Click "Analyze FSM" to validate.</p>';
    return;
  }
  const r = analysisResult;
  let html = `<div class="badge ${r.valid?'valid':'invalid'}">${r.valid?'✓ Valid FSM':'✗ Invalid FSM'}</div>`;
  html += `<div class="result-section"><h3>Dead-End States</h3><span class="count">${r.deadEnds.length} found</span><div class="chip-list">${r.deadEnds.map(s=>`<span class="chip dead">${s}</span>`).join('')||'<span class="chip ok">None</span>'}</div></div>`;
  html += `<div class="result-section"><h3>Unreachable States</h3><span class="count">${r.unreachable.length} found</span><div class="chip-list">${r.unreachable.map(s=>`<span class="chip unreachable">${s}</span>`).join('')||'<span class="chip ok">None</span>'}</div></div>`;
  if(simState.active){
    html += `<div class="result-section"><h3>Simulation</h3><p style="font-size:.8rem">Current: <strong>${simState.current}</strong></p>`;
    const trans = fsm.transitions.filter(t=>t.from===simState.current);
    if(trans.length){
      html += `<div class="sim-actions">${trans.map(t=>`<button onclick="window._simStep('${t.to}','${t.action}')">${t.action} → ${t.to}</button>`).join('')}</div>`;
    } else {
      html += `<div class="stuck-warn">⚠ STUCK — No transitions available</div>`;
    }
    html += `<div class="sim-trace">${simState.trace.map(s=>`<div class="step">${s}</div>`).join('')}</div>`;
    html += `<button class="danger full" onclick="window._stopSim()">■ Stop Simulation</button></div>`;
  }
  out.innerHTML = html;
}

/* ===== SIMULATION ===== */
function toggleSimulation(){
  if(simState.active){stopSim();return;}
  if(!fsm.startState){alert('Set a start state first');return;}
  runAnalysis();
  simState = {active:true, current:fsm.startState, trace:['Start → '+fsm.startState]};
  renderGraph(); renderAnalysis();
}
window._simStep = function(to,action){
  const from = simState.current;
  simState.trace.push(`${from} --[${action}]--> ${to}`);
  animateEdge(from, to, ()=>{
    simState.current = to;
    renderGraph(); renderAnalysis();
  });
};
window._stopSim = function(){stopSim();};
function stopSim(){
  simState={active:false,current:null,trace:[]};
  renderGraph();renderAnalysis();
}

function animateEdge(from, to, onDone){
  // Find the base path element
  let basePath = null;
  d3.selectAll('.edge-path').each(function(){
    const el = d3.select(this);
    if(el.attr('data-from')===from && el.attr('data-to')===to) basePath = this;
  });
  if(!basePath){ if(onDone) onDone(); return; }

  const pathD   = basePath.getAttribute('d');
  const totalLen = basePath.getTotalLength();
  const svg = d3.select('#fsm-canvas');

  // Create a vivid overlay path that traces the same route
  const overlay = svgGroup.append('path')
    .attr('d', pathD)
    .attr('fill', 'none')
    .attr('stroke', '#3ECFCF')          // bright teal
    .attr('stroke-width', 6)
    .attr('stroke-linecap', 'round')
    .attr('filter', 'url(#glow)')
    .attr('marker-end', 'url(#arrow-teal)')
    .attr('pointer-events', 'none')
    .attr('stroke-dasharray', totalLen)
    .attr('stroke-dashoffset', totalLen);

  // Also pulse/brighten the base edge
  d3.select(basePath)
    .transition().duration(100)
    .attr('stroke', '#3ECFCF').attr('stroke-width', 3)
    .transition().duration(600)
    .attr('stroke', 'var(--text-muted)').attr('stroke-width', 1.8);

  // Race the overlay from start to end
  overlay.transition()
    .duration(700)
    .ease(d3.easeCubicInOut)
    .attr('stroke-dashoffset', 0)
    .on('end', function(){
      // Fade out
      d3.select(this).transition().duration(250).attr('stroke-opacity', 0)
        .on('end', function(){ d3.select(this).remove(); if(onDone) onDone(); });
    });
}

/* ===== GRAPH RENDERING ===== */
let svgGroup, zoom;
function renderGraph(){
  const svg = d3.select('#fsm-canvas');
  svg.selectAll('*').remove();

  // defs
  const defs = svg.append('defs');

  // Glow filter for animation
  const filter = defs.append('filter').attr('id','glow').attr('x','-40%').attr('y','-40%').attr('width','180%').attr('height','180%');
  filter.append('feGaussianBlur').attr('stdDeviation','4').attr('result','coloredBlur');
  const feMerge = filter.append('feMerge');
  feMerge.append('feMergeNode').attr('in','coloredBlur');
  feMerge.append('feMergeNode').attr('in','SourceGraphic');

  defs.append('marker').attr('id','arrow').attr('viewBox','0 0 10 10').attr('refX',10).attr('refY',5)
    .attr('markerWidth',8).attr('markerHeight',8).attr('orient','auto-start-reverse')
    .append('path').attr('d','M0,0 L10,5 L0,10 Z').attr('fill','var(--text-muted)');
  // colored arrows
  ['accent','error','valid','warn','teal'].forEach(c=>{
    defs.append('marker').attr('id','arrow-'+c).attr('viewBox','0 0 10 10').attr('refX',10).attr('refY',5)
      .attr('markerWidth',8).attr('markerHeight',8).attr('orient','auto-start-reverse')
      .append('path').attr('d','M0,0 L10,5 L0,10 Z').attr('fill',`var(--${c})`);
  });

  svgGroup = svg.append('g').attr('class','graph-root');

  // zoom
  zoom = d3.zoom().scaleExtent([.3,3]).on('zoom',e=>svgGroup.attr('transform',e.transform));
  svg.call(zoom);

  // tooltip
  let tooltip = d3.select('.tooltip');
  if(tooltip.empty()) tooltip = d3.select('#center-panel').append('div').attr('class','tooltip');

  // compute edge info
  const edgePairs = {};
  fsm.transitions.forEach(t=>{
    const key=[t.from,t.to].sort().join('|');
    edgePairs[key]=(edgePairs[key]||0)+1;
  });
  const edgeIndex = {};
  fsm.transitions.forEach(t=>{
    const key=[t.from,t.to].sort().join('|');
    edgeIndex[t.from+'→'+t.to+'→'+t.action] = (edgeIndex[t.from+'→'+t.to+'→'+t.action]||0);
  });

  // draw edges
  const edgeG = svgGroup.append('g').attr('class','edges');
  fsm.transitions.forEach(t=>{
    const p1=nodePositions[t.from], p2=nodePositions[t.to];
    if(!p1||!p2) return;

    let pathD, labelPos;
    const isSelf = t.from===t.to;
    const biKey = [t.from,t.to].sort().join('|');
    const hasBi = fsm.transitions.some(x=>x.from===t.to&&x.to===t.from);

    if(isSelf){
      // self-loop
      const lx=p1.x, ly=p1.y-NODE_R;
      pathD=`M${lx-12},${ly} C${lx-40},${ly-55} ${lx+40},${ly-55} ${lx+12},${ly}`;
      labelPos={x:lx,y:ly-45};
    } else {
      const dx=p2.x-p1.x, dy=p2.y-p1.y;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const ux=dx/len, uy=dy/len;
      // offset start/end by radius
      const sx=p1.x+ux*NODE_R, sy=p1.y+uy*NODE_R;
      const ex=p2.x-ux*NODE_R, ey=p2.y-uy*NODE_R;
      if(hasBi){
        const off = (t.from<t.to?1:-1)*30;
        const mx=(sx+ex)/2 - uy*off, my=(sy+ey)/2 + ux*off;
        pathD=`M${sx},${sy} Q${mx},${my} ${ex},${ey}`;
        labelPos={x:(sx+2*mx+ex)/4,y:(sy+2*my+ey)/4};
      } else {
        pathD=`M${sx},${sy} L${ex},${ey}`;
        labelPos={x:(sx+ex)/2 - uy*12, y:(sy+ey)/2 + ux*12};
      }
    }

    edgeG.append('path').attr('class','edge-path')
      .attr('d',pathD).attr('fill','none').attr('stroke','var(--text-muted)')
      .attr('stroke-width',1.8).attr('marker-end','url(#arrow)')
      .attr('data-from',t.from).attr('data-to',t.to);

    edgeG.append('text').attr('class','edge-label')
      .attr('x',labelPos.x).attr('y',labelPos.y)
      .attr('text-anchor','middle').attr('dy','-4').text(t.action);
  });

  // draw nodes
  const nodeG = svgGroup.append('g').attr('class','nodes');
  fsm.states.forEach(s=>{
    const pos = nodePositions[s];
    if(!pos) return;
    const g = nodeG.append('g').attr('transform',`translate(${pos.x},${pos.y})`).attr('class','node-group');

    // determine color
    let fill='var(--valid)', stroke='var(--valid)';
    if(simState.active && simState.current===s){fill='var(--teal)';stroke='var(--teal)';}
    else if(s===fsm.startState){fill='var(--accent)';stroke='var(--accent)';}
    else if(analysisResult){
      if(analysisResult.deadEnds.includes(s)){fill='var(--error)';stroke='var(--error)';}
      else if(analysisResult.unreachable.includes(s)){fill='var(--warn)';stroke='var(--warn)';}
    }

    g.append('circle').attr('r',NODE_R).attr('fill',fill).attr('fill-opacity',.15)
      .attr('stroke',stroke).attr('stroke-width',s===fsm.startState?3.5:2)
      .style('transition','all .3s ease');

    if(s===fsm.startState){
      g.append('circle').attr('r',NODE_R+6).attr('fill','none')
        .attr('stroke','var(--accent)').attr('stroke-width',1.5).attr('stroke-dasharray','4 3');
    }

    g.append('text').attr('class','node-label').attr('dy',4).text(s);

    // drag
    const drag = d3.drag()
      .on('drag',(e)=>{
        nodePositions[s].x=e.x; nodePositions[s].y=e.y;
        renderGraph();
      });
    g.call(drag);

    // tooltip
    g.on('mouseenter',(e)=>{
      const out = fsm.transitions.filter(t=>t.from===s);
      let html=`<h4>${s}</h4><ul>${out.map(t=>`<li>→ ${t.to} [${t.action}]</li>`).join('')}</ul>`;
      if(!out.length) html+=`<p style="color:var(--error);font-size:.75rem">No outgoing transitions</p>`;
      tooltip.html(html).classed('show',true)
        .style('left',(e.offsetX+16)+'px').style('top',(e.offsetY-8)+'px');
    }).on('mouseleave',()=>tooltip.classed('show',false));
  });
}

/* ===== TOOLBAR ===== */
document.getElementById('graph-toolbar').innerHTML =
  '<span style="font-size:.8rem;color:var(--text-muted)">↕ Scroll to zoom · Drag nodes to reposition</span>';

/* ===== INIT ===== */
init();

})();
</script>
</body>
</html>
